<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; gap: 10px; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 10px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="log">Measuring icons...<br></div>
    <script>
        const files = [
            { name: 'star_fail.png', label: 'Red' },
            { name: 'star_poor.png', label: 'Orange' },
            { name: 'star_fair.png', label: 'Yellow' },
            { name: 'star_good.png', label: 'Light Green' },
            { name: 'star_very_good.png', label: 'Green' }
        ];

        async function measure() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = '';

            for (const file of files) {
                try {
                    const img = new Image();
                    img.src = '/icons/' + file.name;
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                    });

                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, img.width, img.height);
                    const data = imageData.data;

                    let minX = img.width, maxX = 0, minY = img.height, maxY = 0;

                    for (let y = 0; y < img.height; y++) {
                        for (let x = 0; x < img.width; x++) {
                            const index = (y * img.width + x) * 4;
                            const alpha = data[index + 3];
                            if (alpha > 0) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }

                    const visibleWidth = maxX - minX + 1;
                    const visibleHeight = maxY - minY + 1;

                    logDiv.innerHTML += `<b>${file.label}</b> (${file.name}): File: ${img.width}x${img.height} | Content: ${visibleWidth}x${visibleHeight}<br>`;
                } catch (err) {
                    logDiv.innerHTML += `Error measuring ${file.name}<br>`;
                }
            }
        }

        measure();
    </script>
</body>
</html>
